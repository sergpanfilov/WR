project:
  type: website
  output-dir: _site
  resources:
    - "CNAME"
    - "assets/**"

website:
  title: "Вейшнория Inc."
  description: "Устойчивая диаспоральная организация беларусов в эмиграции"
  site-url: "https://white-ribbon.net"
  favicon: "assets/Logo_WR_dark.svg"
  page-navigation: false
  search:
    location: navbar
    type: overlay
    keyboard-shortcut: ["/", "?", "k"]
    limit: 20
    copy-button: false
    show-item-context: true
  navbar:
    background: "#FEFDF8"
    foreground: "#1A1A1A"
    logo: "assets/Logo_WR_light.svg"
    logo-alt: "Вейшнория Inc."
    logo-href: "/ru/"
    right:
      - text: "О нас"
        href: ru/about.qmd
      - text: "Философия"
        href: ru/philosophy.qmd
      - text: "Проекты"
        href: ru/projects.qmd
      - text: "Присоединиться"
        href: ru/join.qmd
  page-footer:
    background: "#FEFDF8"
    border: false
    left: |
      <span class="footer-mark">Вейшнория Inc. · Устойчивая диаспоральная организация</span>
    right: |
      <span class="footer-meta">© 2026</span>

format:
  html:
    theme:
      light:
        - default
        - styles/custom.scss
      dark:
        - darkly
        - styles/custom.scss
        - styles/dark.scss
    toc: false
    page-layout: article
    fontsize: 1.125rem
    linkcolor: "#C8202A"
    code-copy: false
    anchor-sections: true
    smooth-scroll: true
    title-block-style: none
    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@100;300&family=JetBrains+Mono:wght@400&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@1,8..60,400&display=swap" rel="stylesheet">
    include-after-body:
      text: |
        <script src="/assets/lang-switch.js"></script>

execute:
  freeze: auto

bibliography: references.bib
csl: csl/chicago-author-date.csl
